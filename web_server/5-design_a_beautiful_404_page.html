<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>404 - Page Not Found</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: #ffffff;
            font-family: Arial, Helvetica, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        .container {
            max-width: 600px;
        }

        h1 {
            font-size: 120px;
            margin: 0;
            color: #38bdf8;
        }

        h2 {
            margin-top: 10px;
            font-weight: normal;
            color: #cbd5e1;
        }

        p {
            margin: 20px 0;
            color: #94a3b8;
        }

        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 25px;
            background: #38bdf8;
            color: #0f172a;
            text-decoration: none;
            font-weight: bold;
            border-radius: 8px;
            transition: 0.3s ease;
        }

        .btn:hover {
            background: #0ea5e9;
        }

        .footer {
            margin-top: 40px;
            font-size: 14px;
            color: #64748b;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>404</h1>
    <h2>Oops! Page Not Found</h2>

    <p>Ceci n'est pas une page</p>

    <p>The page you’re looking for doesn’t exist or has been moved.</p>

    <a href="/" class="btn">Go Back Home</a>

    <div class="footer">
        Inspired by modern cloud & developer platforms 🚀
    </div>
</div>

</body>
</html>
